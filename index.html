<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuel Price Converter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --accent: #38bdf8;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    max-width: 860px;
    width: 100%;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 6px;
}

.subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 28px;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,.4);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
}

label {
    font-size: .9rem;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: var(--text);
    font-size: 1rem;
}

input:focus, select:focus {
    outline: 2px solid var(--accent);
}

button {
    margin-top: 22px;
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #020617;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: .9;
}

.result {
    margin-top: 24px;
    padding: 16px;
    background: #020617;
    border-radius: 10px;
    text-align: center;
    font-size: 1.1rem;
}

.footer {
    margin-top: 16px;
    text-align: center;
    font-size: .8rem;
    color: var(--muted);
}
</style>
</head>

<body>

<div class="container">
    <h1>Fuel Price Converter</h1>
    <div class="subtitle">
        Convert fuel prices between volume units and currencies using live exchange rates
    </div>

    <div class="card">
        <div class="grid">
            <div>
                <label>Price</label>
                <input type="number" id="price" placeholder="e.g. 3.79">
            </div>

            <div>
                <label>From unit</label>
                <select id="fromUnit">
                    <option value="litre">Per litre</option>
                    <option value="usg">Per US gallon</option>
                    <option value="impg">Per Imperial gallon</option>
                </select>
            </div>

            <div>
                <label>From currency</label>
                <select id="fromCurrency">
                    <option>USD</option>
                    <option>GBP</option>
                    <option>EUR</option>
                    <option>CAD</option>
                    <option>AUD</option>
                </select>
            </div>

            <div>
                <label>To unit</label>
                <select id="toUnit">
                    <option value="litre">Per litre</option>
                    <option value="usg">Per US gallon</option>
                    <option value="impg">Per Imperial gallon</option>
                </select>
            </div>

            <div>
                <label>To currency</label>
                <select id="toCurrency">
                    <option>USD</option>
                    <option>GBP</option>
                    <option>EUR</option>
                    <option>CAD</option>
                    <option>AUD</option>
                </select>
            </div>
        </div>

        <button onclick="convert()">Convert</button>

        <div class="result" id="result">—</div>
    </div>

    <div class="footer" id="rateInfo">
        Loading exchange rates…
    </div>

    <div class="footer">
        Exchange rates via European Central Bank (Frankfurter API)
    </div>
</div>

<script>
const LITRES = {
    litre: 1,
    usg: 3.785411784,
    impg: 4.54609
};

let rates = {};
let updated = "";

async function loadRates() {
    const res = await fetch("https://api.frankfurter.app/latest");
    const data = await res.json();
    rates = data.rates;
    rates.EUR = 1;
    updated = data.date;

    document.getElementById("rateInfo").innerText =
        `Exchange rates last updated: ${updated} (ECB reference rates)`;
}

function convert() {
    const price = parseFloat(document.getElementById("price").value);
    if (isNaN(price)) return;

    const fromUnit = document.getElementById("fromUnit").value;
    const toUnit = document.getElementById("toUnit").value;
    const fromCur = document.getElementById("fromCurrency").value;
    const toCur = document.getElementById("toCurrency").value;

    // Normalise to price per litre
    let perLitre = price / LITRES[fromUnit];

    // Currency conversion via EUR
    let eur = perLitre / rates[fromCur];
    let converted = eur * rates[toCur];

    // Convert litre → target unit
    converted *= LITRES[toUnit];

    document.getElementById("result").innerHTML =
        `${converted.toFixed(3)} ${toCur} per ${unitLabel(toUnit)}`;
}

function unitLabel(u) {
    if (u === "litre") return "litre";
    if (u === "usg") return "US gallon";
    if (u === "impg") return "Imperial gallon";
}

loadRates();
</script>

</body>
</html>
