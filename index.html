<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuel Price Converter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: system-ui, sans-serif;
    background: #f4f6f9;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}
h1, h2 { text-align: center; }
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 20px;
}
.card {
    background: #fff;
    padding: 18px;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}
label {
    display: block;
    margin-top: 12px;
    font-weight: 600;
}
input, select {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
}
button {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    font-weight: bold;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover { background: #1e40af; }
.result {
    margin-top: 14px;
    font-weight: bold;
    text-align: center;
}
.small {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #555;
    text-align: center;
}
.cheaper { color: green; }
.expensive { color: crimson; }
.footer {
    margin-top: 20px;
    font-size: 0.8rem;
    color: #444;
    text-align: center;
}
</style>
</head>

<body>

<h1>Fuel Price Converter</h1>

<div class="grid">

<!-- Converter -->
<div class="card">
<h2>Price Converter</h2>

<label>Price</label>
<input type="number" id="price" value="4" step="0.01">

<label>From unit</label>
<select id="fromUnit">
    <option value="gallon">US Gallon</option>
    <option value="litre">Litre</option>
</select>

<label>From currency</label>
<select id="fromCurrency"></select>

<label>To unit</label>
<select id="toUnit">
    <option value="litre">Litre</option>
    <option value="gallon">US Gallon</option>
</select>

<label>To currency</label>
<select id="toCurrency"></select>

<button onclick="convert()">Convert</button>
<div class="result" id="convertResult"></div>
</div>

<!-- Comparison -->
<div class="card">
<h2>US vs UK Pump Comparison</h2>

<label>Fuel type</label>
<select id="fuelType">
    <option>Petrol</option>
    <option>Diesel</option>
</select>

<label>US price (USD per gallon)</label>
<input type="number" id="usPrice" value="4" step="0.01">

<label>UK price (GBP per litre)</label>
<input type="number" id="ukPrice" value="1.50" step="0.01">

<button onclick="compare()">Compare</button>
<div class="result" id="compareResult"></div>
</div>

</div>

<p class="small" id="rateInfo">Loading live exchange rates…</p>

<div class="footer" id="rateSource"></div>

<script>
/* ---------------- CONSTANTS ---------------- */
const GALLON_TO_LITRE = 3.785411784;

/* ---------------- GLOBAL DATA ---------------- */
let rates = {};
let rateDate = "";
let fetchedAt = "";

/* ---------------- LOAD EXCHANGE RATES ---------------- */
async function loadRates() {
    try {
        const res = await fetch("https://api.frankfurter.app/latest?from=USD");
        const data = await res.json();

        rates = data.rates;
        rates.USD = 1;

        rateDate = data.date; // ECB rate date
        fetchedAt = new Date().toLocaleString();

        populateCurrencies();
        updateRateInfo();
    } catch (e) {
        document.getElementById("rateInfo").innerText =
            "Exchange rate service unavailable.";
    }
}

/* ---------------- UI HELPERS ---------------- */
function populateCurrencies() {
    const from = document.getElementById("fromCurrency");
    const to = document.getElementById("toCurrency");

    from.innerHTML = "";
    to.innerHTML = "";

    Object.keys(rates).sort().forEach(c => {
        from.innerHTML += `<option value="${c}">${c}</option>`;
        to.innerHTML += `<option value="${c}">${c}</option>`;
    });

    from.value = "USD";
    to.value = "GBP";
}

function updateRateInfo() {
    document.getElementById("rateInfo").innerText =
        `Exchange rates last updated: ${rateDate} (ECB reference rates)`;

    document.getElementById("rateSource").innerHTML = `
        Rates fetched at: ${fetchedAt}<br>
        Source: European Central Bank (via Frankfurter API)<br>
        https://www.ecb.europa.eu
    `;
}

/* ---------------- CONVERTER ---------------- */
function convert() {
    const price = parseFloat(document.getElementById("price").value);
    const fromUnit = document.getElementById("fromUnit").value;
    const toUnit = document.getElementById("toUnit").value;
    const fromCur = document.getElementById("fromCurrency").value;
    const toCur = document.getElementById("toCurrency").value;

    if (isNaN(price)) return;

    let value = price;

    // Unit conversion
    if (fromUnit === "gallon" && toUnit === "litre")
        value /= GALLON_TO_LITRE;
    else if (fromUnit === "litre" && toUnit === "gallon")
        value *= GALLON_TO_LITRE;

    // Currency conversion
    value = value / rates[fromCur];
    value = value * rates[toCur];

    document.getElementById("convertResult").innerText =
        `${value.toFixed(3)} ${toCur} per ${toUnit}`;
}

/* ---------------- COMPARISON ---------------- */
function compare() {
    const fuel = document.getElementById("fuelType").value;
    const us = parseFloat(document.getElementById("usPrice").value);
    const uk = parseFloat(document.getElementById("ukPrice").value);

    if (isNaN(us) || isNaN(uk)) return;

    // USD/gal → GBP/litre
    const usGBPPerLitre =
        (us / GALLON_TO_LITRE) * rates.GBP;

    const diff = usGBPPerLitre - uk;

    document.getElementById("compareResult").innerHTML = `
        <strong>${fuel}</strong><br><br>
        US: £${usGBPPerLitre.toFixed(3)} per litre<br>
        UK: £${uk.toFixed(3)} per litre<br><br>
        <span class="${diff < 0 ? 'cheaper' : 'expensive'}">
            ${diff < 0 ? "US fuel is cheaper" : "UK fuel is cheaper"}
        </span>
    `;
}

loadRates();
</script>

</body>
</html>
