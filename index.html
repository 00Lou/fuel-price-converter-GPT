<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuel Price Converter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #38bdf8;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.container {
    max-width: 980px;
    width: 100%;
    padding: 24px;
}

h1 {
    text-align: center;
    margin-bottom: 6px;
}

.subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 30px;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,.45);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
}

label {
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: var(--text);
    font-size: 1rem;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--accent);
}

button {
    margin-top: 22px;
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #020617;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    padding: 16px;
    background: #020617;
    border-radius: 10px;
    font-size: .95rem;
}

.footer {
    margin-top: 18px;
    text-align: center;
    font-size: .8rem;
    color: var(--muted);
}
</style>
</head>

<body>

<div class="container">
    <h1>Fuel Price Converter</h1>
    <div class="subtitle">
        Enter prices in pence / cents (e.g. UK 139.9, US 379.9)
    </div>

    <div class="card">
        <div class="grid">

            <div>
                <label>Prices (one per line)</label>
                <textarea id="prices" placeholder="139.9&#10;145.3&#10;152.7"></textarea>
            </div>

            <div>
                <label>From unit</label>
                <select id="fromUnit">
                    <option value="litre">Per litre</option>
                    <option value="usg">Per US gallon</option>
                    <option value="impg">Per Imperial gallon</option>
                </select>

                <label style="margin-top:12px;">From currency</label>
                <select id="fromCurrency">
                    <option>GBP</option>
                    <option>USD</option>
                    <option>EUR</option>
                    <option>CAD</option>
                    <option>AUD</option>
                </select>

                <label style="margin-top:12px;">To unit</label>
                <select id="toUnit">
                    <option value="litre">Per litre</option>
                    <option value="usg">Per US gallon</option>
                    <option value="impg">Per Imperial gallon</option>
                </select>

                <label style="margin-top:12px;">To currency</label>
                <select id="toCurrency">
                    <option>GBP</option>
                    <option>USD</option>
                    <option>EUR</option>
                    <option>CAD</option>
                    <option>AUD</option>
                </select>
            </div>

        </div>

        <button onclick="convertBatch()">Convert batch</button>

        <div class="result" id="result">—</div>
    </div>

    <div class="footer" id="rateInfo">Loading exchange rates…</div>
    <div class="footer">Exchange rates via European Central Bank (Frankfurter API)</div>
</div>

<script>
const LITRES = {
    litre: 1,
    usg: 3.785411784,
    impg: 4.54609
};

const SUBUNITS = {
    GBP: 100,
    USD: 100,
    EUR: 100,
    CAD: 100,
    AUD: 100
};

let rates = {};

async function loadRates() {
    const res = await fetch("https://api.frankfurter.app/latest");
    const data = await res.json();
    rates = data.rates;
    rates.EUR = 1;

    document.getElementById("rateInfo").innerText =
        `Exchange rates last updated: ${data.date} (ECB reference rates)`;
}

function convertBatch() {
    const lines = document.getElementById("prices").value
        .split("\n")
        .map(l => parseFloat(l.trim()))
        .filter(v => !isNaN(v));

    if (!lines.length) return;

    const fromUnit = fromUnitEl.value;
    const toUnit = toUnitEl.value;
    const fromCur = fromCurrency.value;
    const toCur = toCurrency.value;

    let output = "<strong>Converted prices:</strong><br><br>";

    lines.forEach(v => {
        let major = v / SUBUNITS[fromCur];            // cents → dollars
        let perLitre = major / LITRES[fromUnit];      // unit → litre
        let eur = perLitre / rates[fromCur];          // → EUR
        let converted = eur * rates[toCur];           // → target currency
        converted *= LITRES[toUnit];                  // litre → unit

        output += `${v.toFixed(1)} → ${converted.toFixed(3)} ${toCur} per ${label(toUnit)}<br>`;
    });

    result.innerHTML = output;
}

function label(u) {
    if (u === "litre") return "litre";
    if (u === "usg") return "US gallon";
    if (u === "impg") return "Imperial gallon";
}

const fromUnitEl = document.getElementById("fromUnit");
const toUnitEl = document.getElementById("toUnit");
const fromCurrency = document.getElementById("fromCurrency");
const toCurrency = document.getElementById("toCurrency");
const result = document.getElementById("result");

loadRates();
</script>

</body>
</html>
