<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuel Price & Station Comparator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: system-ui, sans-serif;
    background: #f4f6f9;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}
h1, h2 { text-align: center; }
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 20px;
}
.card {
    background: white;
    padding: 18px;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}
label {
    display: block;
    margin-top: 10px;
    font-weight: 600;
}
input, select {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
}
button {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    font-weight: bold;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover { background: #1e40af; }
.station {
    border-top: 1px solid #ddd;
    padding-top: 10px;
    margin-top: 10px;
}
.result {
    margin-top: 12px;
    font-weight: bold;
    text-align: center;
}
.small {
    font-size: 0.8rem;
    color: #555;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>Fuel Price & Station Comparator</h1>

<div class="grid">

<!-- LOCATION & STATIONS -->
<div class="card">
<h2>Nearest Fuel Stations</h2>
<button onclick="locate()">Find my nearest stations</button>
<div id="stations"></div>
</div>

<!-- PRICE COMPARISON -->
<div class="card">
<h2>Cross-Country Fuel Comparison</h2>

<label>Fuel type</label>
<select id="fuelType">
    <option value="petrol">Petrol</option>
    <option value="diesel">Diesel</option>
</select>

<label>Compare my country to</label>
<select id="compareCountry">
    <option value="US">United States</option>
    <option value="UK">United Kingdom</option>
</select>

<button onclick="compare()">Compare average prices</button>
<div class="result" id="compareResult"></div>
</div>

</div>

<p class="small" id="rateInfo">Loading exchange rates…</p>
<p class="small">
Station locations © OpenStreetMap contributors<br>
Fuel prices shown are <strong>national averages</strong>, not live station prices
</p>

<script>
/* ---------------- CONSTANTS ---------------- */
const GALLON_TO_LITRE = 3.785411784;

/* National average prices (approximate, clearly labelled) */
const AVERAGE_PRICES = {
    US: {
        petrol: { value: 3.60, unit: "gallon", currency: "USD" },
        diesel: { value: 4.10, unit: "gallon", currency: "USD" }
    },
    UK: {
        petrol: { value: 1.45, unit: "litre", currency: "GBP" },
        diesel: { value: 1.55, unit: "litre", currency: "GBP" }
    }
};

let rates = {};
let rateDate = "";
let fetchedAt = "";

/* ---------------- LOAD EXCHANGE RATES ---------------- */
async function loadRates() {
    try {
        const res = await fetch("https://api.frankfurter.app/latest?from=USD");
        const data = await res.json();
        rates = data.rates;
        rates.USD = 1;
        rateDate = data.date;
        fetchedAt = new Date().toLocaleString();

        document.getElementById("rateInfo").innerText =
            `Exchange rates: ECB (${rateDate}), fetched ${fetchedAt}`;
    } catch {
        document.getElementById("rateInfo").innerText =
            "Exchange rate service unavailable.";
    }
}

/* ---------------- GEOLOCATION ---------------- */
function locate() {
    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
        loadStations(pos.coords.latitude, pos.coords.longitude);
    });
}

async function loadStations(lat, lon) {
    const query = `
    [out:json];
    node["amenity"="fuel"](around:5000,${lat},${lon});
    out;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
    });

    const data = await res.json();
    displayStations(data.elements.slice(0, 5));
}

function displayStations(stations) {
    const container = document.getElementById("stations");
    container.innerHTML = "";

    stations.forEach(s => {
        container.innerHTML += `
        <div class="station">
            <strong>${s.tags.name || "Unnamed station"}</strong><br>
            Fuel: petrol / diesel<br>
            Location: ${s.lat.toFixed(4)}, ${s.lon.toFixed(4)}<br>
            <em>Prices not publicly available</em>
        </div>`;
    });
}

/* ---------------- COMPARISON ---------------- */
function compare() {
    const fuel = document.getElementById("fuelType").value;
    const target = document.getElementById("compareCountry").value;

    const local = detectCountry();
    const localData = AVERAGE_PRICES[local][fuel];
    const targetData = AVERAGE_PRICES[target][fuel];

    let localPerLitre = normalize(localData);
    let targetPerLitre = normalize(targetData);

    document.getElementById("compareResult").innerHTML = `
        <strong>${fuel.toUpperCase()}</strong><br><br>
        ${local}: £${localPerLitre.toFixed(2)} per litre<br>
        ${target}: £${targetPerLitre.toFixed(2)} per litre<br><br>
        ${localPerLitre < targetPerLitre
            ? `${local} is cheaper`
            : `${target} is cheaper`}
    `;
}

function normalize(data) {
    let value = data.value;

    if (data.unit === "gallon")
        value /= GALLON_TO_LITRE;

    value = value / rates[data.currency];
    value = value * rates.GBP;

    return value;
}

function detectCountry() {
    return navigator.language.startsWith("en-US") ? "US" : "UK";
}

loadRates();
</script>

</body>
</html>
